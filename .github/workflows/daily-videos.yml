name: Daily Video Pipeline

on:
  schedule:
    # Runs every day at 08:00 Jerusalem time (IDT = UTC+3, so 05:00 UTC)
    - cron: "0 5 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      count:
        description: "Number of videos to generate"
        required: false
        default: "3"
      dry_run:
        description: "Dry run (render only, no upload)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      renderer:
        description: "Renderer (hyperframes is the default; remotion remains as fallback)"
        required: false
        default: "hyperframes"
        type: choice
        options: ["hyperframes", "remotion"]

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write # Needed to commit updated video-uploads.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies (Chromium + ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            fonts-liberation \
            libappindicator3-1 \
            libnspr4 \
            xdg-utils

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Run daily video pipeline
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL_ID: ${{ secrets.ELEVENLABS_MODEL_ID }}
        run: |
          COUNT="${{ github.event.inputs.count || '3' }}"
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          RENDERER="${{ github.event.inputs.renderer || 'hyperframes' }}"
          if [ "$RENDERER" = "remotion" ]; then
            echo "Using Remotion renderer (fallback)"
            node scripts/daily-video-pipeline.mjs --count $COUNT $DRY_RUN_FLAG
          else
            echo "Using HyperFrames renderer (default — Data Drift style + ElevenLabs v3 narration)"
            node scripts/daily-video-pipeline-hf.mjs --count $COUNT $DRY_RUN_FLAG
          fi

      - name: Commit and push updated video upload log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/video-uploads.json remotion/data/
          if git diff --staged --quiet; then
            echo "No new uploads to commit"
          else
            git commit -m "chore: daily video upload $(date -u +%Y-%m-%d)

            Auto-generated by GitHub Actions daily-videos workflow."
            git push
          fi
