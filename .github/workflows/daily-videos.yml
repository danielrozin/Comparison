name: Daily Video Pipeline

on:
  schedule:
    # Runs every day at 08:00 Jerusalem time (IDT = UTC+3, so 05:00 UTC)
    - cron: "0 5 * * *"
  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      count:
        description: "Number of videos to generate"
        required: false
        default: "3"
      slugs:
        description: "Space/comma-separated slugs to publish explicitly (overrides count; e.g. 'usa-vs-china ww1-vs-ww2'). Leave blank for auto-pick."
        required: false
        default: ""
      dry_run:
        description: "Dry run (render only, no upload)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      renderer:
        description: "Renderer (hyperframes is the default; remotion remains as fallback)"
        required: false
        default: "hyperframes"
        type: choice
        options: ["hyperframes", "remotion"]

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    permissions:
      contents: write # Needed to commit updated video-uploads.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install system dependencies (Chromium + ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            fonts-liberation \
            libappindicator3-1 \
            libnspr4 \
            xdg-utils

      - name: Install npm dependencies
        run: npm install --no-audit --no-fund

      - name: Run daily video pipeline
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          ELEVENLABS_MODEL_ID: ${{ secrets.ELEVENLABS_MODEL_ID }}
        run: |
          COUNT="${{ github.event.inputs.count || '3' }}"
          SLUGS="${{ github.event.inputs.slugs || '' }}"
          DRY_RUN_FLAG=""
          # DAN-1198 (interim brand-quality gate): force dry-run on the daily
          # scheduled cron until ELEVENLABS_API_KEY is provisioned (DAN-1197).
          # Without narration the renders are silent + caption-less, which we
          # must not auto-upload to the brand's public YouTube channel.
          # Manual workflow_dispatch still honors the dry_run input so operators
          # can test-render (or test-upload once the secret lands).
          # REVERT when DAN-1197 lands: delete this schedule branch so cron
          # uploads again (or simply leave it and re-render slugs manually).
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "::notice::DAN-1198 — scheduled run forced to dry-run (no YouTube upload) until ELEVENLABS_API_KEY is provisioned (DAN-1197)."
          elif [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          RENDERER="${{ github.event.inputs.renderer || 'hyperframes' }}"
          if [ "$RENDERER" = "remotion" ]; then
            SCRIPT="scripts/daily-video-pipeline.mjs"
            echo "Using Remotion renderer (fallback)"
          else
            SCRIPT="scripts/daily-video-pipeline-hf.mjs"
            echo "Using HyperFrames renderer (default — Data Drift style + ElevenLabs v3 narration)"
          fi
          # Normalize commas to spaces so either separator works.
          SLUGS="$(echo "$SLUGS" | tr ',' ' ')"
          if [ -n "$SLUGS" ]; then
            echo "Explicit slug mode: $SLUGS"
            FAILED=""
            for s in $SLUGS; do
              echo "::group::Publishing $s"
              if node "$SCRIPT" --slug "$s" $DRY_RUN_FLAG; then
                echo "OK: $s"
              else
                echo "FAILED: $s"
                FAILED="$FAILED $s"
              fi
              echo "::endgroup::"
            done
            if [ -n "$FAILED" ]; then
              echo "::warning::Some slugs failed:$FAILED"
            fi
          else
            node "$SCRIPT" --count $COUNT $DRY_RUN_FLAG
          fi

      - name: Commit and push updated video upload log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/video-uploads.json remotion/data/
          if git diff --staged --quiet; then
            echo "No new uploads to commit"
          else
            git commit -m "chore: daily video upload $(date -u +%Y-%m-%d)

            Auto-generated by GitHub Actions daily-videos workflow."
            git push
          fi
