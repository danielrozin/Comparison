name: Update Lockfile (Linux)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lockfile:
    name: Regenerate package-lock.json on Linux Node 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate lockfile on Linux x64
        run: npm install --package-lock-only

      - name: Commit updated lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --staged --quiet; then
            echo "No lockfile changes — already Linux-compatible."
          else
            git commit -m "chore: regenerate package-lock.json for Linux Node 20 (DAN-1653)"
            git push
            echo "Lockfile updated and pushed."
          fi
